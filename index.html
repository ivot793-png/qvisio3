<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QVision Studio</title>
<style>
/* =================== BASE =================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Arial Black",Arial,sans-serif;}
body{
  background:url('https://images.unsplash.com/photo-1611162616475-46b635cb6868?q=80&w=1920') center/cover no-repeat fixed;
  color:white; cursor:crosshair; overflow-x:hidden; scroll-behavior:smooth;
}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:-1;}
h1{font-size:70px;text-shadow:0 0 30px rgba(139,92,246,0.8);}
p{font-size:24px;opacity:0.8;}

/* =================== MENU =================== */
.menu{
  position:fixed; top:0; width:100%; height:40px;
  background:#1a1a1fcc; display:flex; align-items:center;
  padding:0 20px; z-index:20;
}
.menu span{margin-right:25px; cursor:pointer; color:#bbb; font-weight:bold;}
.menu span:hover{color:#4cc9f0;}

/* =================== PANELS =================== */
.left{position:fixed;top:40px;left:0;width:90px;bottom:140px;background:#111138;border-right:1px solid #222;z-index:5;}
.right{position:fixed;top:40px;right:0;width:230px;bottom:140px;background:#111138;border-left:1px solid #222;padding:10px;z-index:5;}
.right h3{font-size:16px;margin-bottom:10px;}
.control{height:8px;background:#333;margin:10px 0;border-radius:5px;}

/* =================== VIEWER =================== */
.viewer{margin-left:90px;margin-right:230px;margin-top:50px;padding:40px 20px;text-align:center;}
.section{margin-top:60px;padding-bottom:100px;}
.money img{width:420px;border-radius:10px;margin-top:20px;}
.quote{margin-top:20px;font-size:28px;color:#ccc;}

/* =================== TIMELINE =================== */
.timeline{display:none;position:relative;width:100%;height:160px;background:#0d0d12;border-top:1px solid #222;overflow:hidden;margin-top:30px;}
.track{display:flex;gap:15px;animation:scroll 10s linear infinite;}
.clip{width:140px;height:50px;background:linear-gradient(90deg,#8b5cf6,#4cc9f0);border-radius:6px;transition:all 0.3s;box-shadow:0 0 5px rgba(140,92,246,0.6);}
.clip:hover{transform:scale(1.2) rotate(3deg);box-shadow:0 0 20px rgba(140,92,246,1);}
.playhead{position:absolute;left:50%;top:0;width:2px;height:100%;background:red;box-shadow:0 0 10px red;}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-700px);}}

/* =================== PHOTO EDIT =================== */
.photo-gallery{display:none; margin-top:20px; justify-content:center; flex-wrap:wrap; gap:15px;}
.photo-gallery img{width:180px;border-radius:10px;cursor:pointer;transition:all 0.3s;box-shadow:0 0 5px rgba(76,201,240,0.6);}
.photo-gallery img:hover{transform:scale(1.15) rotate(-2deg); filter:brightness(1.3); box-shadow:0 0 15px rgba(76,201,240,1);}

/* =================== LIGHTBOX =================== */
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:30;}
#lightbox img{max-width:80%;max-height:80%;border-radius:15px;box-shadow:0 0 20px #4cc9f0;}

/* =================== PHOTO EDIT SLIDERS =================== */
.photo-edit-panel{display:none;margin-top:20px;flex-direction:column;align-items:center;gap:15px;}
.photo-edit-panel label{font-size:16px;}
.photo-edit-panel input[type=range]{width:300px;}

/* =================== LINKS =================== */
a{color:#4cc9f0;text-decoration:none;}
a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="overlay"></div>

<!-- MENU -->
<div class="menu">
<span onclick="scrollToSection('top')">Файл</span>
<span onclick="scrollToSection('portfolio')">Редактиране</span>
<span onclick="showTimeline()">Клип</span>
<span onclick="showGallery()">Цвят</span>
<span onclick="scrollToSection('contact')">Контакти</span>
<span onclick="scrollToSection('top')">QVision</span>
</div>

<!-- LEFT & RIGHT PANELS -->
<div class="left"></div>
<div class="right">
<h3>Инспектор</h3>
<div class="control"></div>
<div class="control"></div>
<div class="control"></div>
</div>

<!-- TOP -->
<div class="viewer" id="top">
<h1>QVision</h1>
<p>Професионален видео и фото монтаж</p>
</div>

<!-- MONEY -->
<div class="viewer section" id="money">
<div class="money"><img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=800" alt="Creative studio desk"></div>
<div class="quote">„Ние не просто създаваме, ние развиваме“</div>
</div>

<!-- PORTFOLIO -->
<div class="viewer section" id="portfolio">
<h1>Портфолио</h1>
<p>Виж нашето съдържание</p>
<p><a href="https://www.tiktok.com/@qvision85" target="_blank">🔗 TikTok</a></p>
</div>

<!-- TIMELINE -->
<div class="timeline" id="timeline">
<div class="playhead"></div>
<div class="track">
  <div class="clip"></div>
  <div class="clip"></div>
  <div class="clip"></div>
  <div class="clip"></div>
  <div class="clip"></div>
  <div class="clip"></div>
</div>
</div>

<!-- PHOTO GALLERY -->
<div class="photo-gallery" id="gallery">
<h1>Photo Editing</h1>
<p>Примери на нашата обработка</p>

<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=400" alt="Editing setup">
<img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=400" alt="Video editing">
<img src="https://images.unsplash.com/photo-1506765515384-028b60a970df?q=80&w=400" alt="Photography workspace">
<img src="https://images.unsplash.com/photo-1581091870623-91a0b0d3e2f6?q=80&w=400" alt="Creative studio">
<img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7?q=80&w=400" alt="Camera setup">
<img src="https://images.unsplash.com/photo-1558980664-10c3e6a7c1ee?q=80&w=400" alt="Photo editing software">

<!-- PHOTO EDIT PANEL -->
<div class="photo-edit-panel" id="photo-edit-panel">
<label>Brightness <input type="range" min="0" max="200" value="100" id="brightness"></label>
<label>Contrast <input type="range" min="0" max="200" value="100" id="contrast"></label>
<label>Saturation <input type="range" min="0" max="200" value="100" id="saturation"></label>
</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img src="" id="lightbox-img">
</div>

<!-- CONTACT -->
<div class="viewer section" id="contact">
<h1>Контакти</h1>
<p>Email: qvision433@gmail.com</p>
<p>Телефон: 0893025503</p>
</div>

<script>
// Scroll
function scrollToSection(id){
  const section = document.getElementById(id);
  if(section) section.scrollIntoView({behavior:'smooth'});
}

// Timeline toggle
function showTimeline(){
  document.getElementById('timeline').style.display='block';
  document.getElementById('gallery').style.display='none';
  document.getElementById('photo-edit-panel').style.display='none';
}

// Gallery toggle
function showGallery(){
  document.getElementById('gallery').style.display='flex';
  document.getElementById('photo-edit-panel').style.display='flex';
  document.getElementById('timeline').style.display='none';
}

// Lightbox
const images = document.querySelectorAll('.photo-gallery img');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
images.forEach(img=>{
  img.addEventListener('click',()=>{
    lbImg.src=img.src;
    lightbox.style.display='flex';
  });
});

// Sliders
const gallery = document.getElementById('gallery');
const brightness = document.getElementById('brightness');
const contrast = document.getElementById('contrast');
const saturation = document.getElementById('saturation');
[brightness,contrast,saturation].forEach(slider=>{
  slider.addEventListener('input',()=>{
    gallery.style.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturation.value}%)`;
  });
});
</script>
</body>
</html>
